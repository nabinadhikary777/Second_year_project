<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Review Received</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #1976d2; color: white; padding: 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-top: none; }
        .review-box { background: white; padding: 15px; border-radius: 5px; margin: 15px 0; border-left: 4px solid #ffc107; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>New Review Received</h2>
        </div>
        <div class="content">
            <p>Hello {{ owner_name }},</p>
            <p>A customer has left a review for your vehicle <strong>{{ vehicle }}</strong>.</p>
            <div class="review-box">
                <p><strong>Rating:</strong> {{ rating }} / 5</p>
                <p><strong>Comment:</strong> {{ comment }}</p>
                <p><strong>From:</strong> {{ customer_name }}</p>
            </div>
            <p style="text-align: center;">
                <a href="{{ site_url }}/owner/reviews" style="display: inline-block; padding: 10px 20px; background: #1976d2; color: white; text-decoration: none; border-radius: 5px;">Reply to Review</a>
            </p>
        </div>
        <div class="footer">
            <p>© {{ year }} SawariSewa. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
