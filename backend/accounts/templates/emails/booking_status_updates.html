<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Booking Status Update</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { 
            background: {% if new_status == 'confirmed' %}#28a745{% elif new_status == 'rejected' %}#dc3545{% else %}#1976d2{% endif %}; 
            color: white; 
            padding: 20px; 
            text-align: center; 
            border-radius: 5px 5px 0 0; 
        }
        .content { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-top: none; }
        .status-box { 
            background: white; 
            padding: 20px; 
            border-radius: 5px; 
            margin: 15px 0;
            text-align: center;
            border-left: 4px solid {% if new_status == 'confirmed' %}#28a745{% elif new_status == 'rejected' %}#dc3545{% else %}#1976d2{% endif %};
        }
        .reason-box { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 15px; border-radius: 5px; margin: 15px 0; }
        .button { display: inline-block; padding: 10px 20px; background: #1976d2; color: white; text-decoration: none; border-radius: 5px; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Booking Status Update</h2>
        </div>
        
        <div class="content">
            <h3>Hello {{ customer_name }}!</h3>
            
            <div class="status-box">
                <h2 style="margin: 0; color: {% if new_status == 'confirmed' %}#28a745{% elif new_status == 'rejected' %}#dc3545{% else %}#1976d2{% endif %};">
                    {{ message }}
                </h2>
                <p style="margin: 10px 0 0;">Booking #{{ booking_id }} - {{ vehicle }}</p>
            </div>
            
            <div style="background: white; padding: 15px; border-radius: 5px;">
                <p><strong>Previous Status:</strong> {{ old_status }}</p>
                <p><strong>New Status:</strong> {{ new_status|upper }}</p>
            </div>
            
            {% if reason %}
            <div class="reason-box">
                <strong>Reason:</strong> {{ reason }}
            </div>
            {% endif %}
            
            <div style="text-align: center; margin: 30px 0;">
                <a href="{{ site_url }}/customer/my-bookings" class="button">
                    View Booking Details
                </a>
            </div>
        </div>
        
        <div class="footer">
            <p>© {{ year }} SawariSewa. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
