<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Payment Received</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #28a745; color: white; padding: 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-top: none; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .value { color: #28a745; font-weight: bold; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Payment Received</h2>
        </div>
        <div class="content">
            <p>Hello {{ owner_name }},</p>
            <p>You have received a payment from <strong>{{ customer_name }}</strong>.</p>
            <div class="detail-row">
                <span>Booking ID:</span>
                <span class="value">#{{ booking_id }}</span>
            </div>
            <div class="detail-row">
                <span>Vehicle:</span>
                <span>{{ vehicle }}</span>
            </div>
            <div class="detail-row">
                <span>Amount:</span>
                <span class="value">रू {{ amount }}</span>
            </div>
            <p style="text-align: center;">
                <a href="{{ site_url }}/owner/earnings" style="display: inline-block; padding: 10px 20px; background: #1976d2; color: white; text-decoration: none; border-radius: 5px;">View Earnings</a>
            </p>
        </div>
        <div class="footer">
            <p>© {{ year }} SawariSewa. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
